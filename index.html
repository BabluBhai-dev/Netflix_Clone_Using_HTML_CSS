<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clone- Netflix</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="box"></div>
      <nav>
        <img src="/assets/logo.svg" alt="logo" width="200px" height="35px" />
        <div>
          <button class="btn">English</button>
          <button class="btn-sign">Sign In</button>
        </div>
      </nav>
      <div class="content">
        <span>Unlimited movie, TV shows and more</span>
        <span>Start at ₹49. Cancel at any time.</span>
        <span
          >Ready to watch? Enter your email to create or restart your
          membership.</span
        >
        <span class="search">
          <input type="text" placeholder="Enter Adress" />
          <button class="btn-start">Get Started</button>
        </span>
      </div>
      <!-- Tranding Now Section -->
      <div class="container">
        <div class="section-title">
          Tranding Now
        </div>
      </div>
    </header>
  </body>
</html>
