<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clone- Netflix</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="box"></div>
      <nav>
        <img src="/assets/logo.svg" alt="logo" width="200px" height="35px" />
        <div>
          <button class="btn">English</button>
          <button class="btn-sign">Sign In</button>
        </div>
      </nav>
      <div class="content">
        <span>Unlimited movie, TV shows and more</span>
        <span>Start at ₹49. Cancel at any time.</span>
        <span
          >Ready to watch? Enter your email to create or restart your
          membership.</span
        >
        <span class="search">
          <input type="text" placeholder="Enter Adress" />
          <button class="btn-start">Get Started</button>
        </span>
      </div>
      <!-- Tranding Now Section -->
      <div class="container">
        <div class="section-title">Tranding Now</div>
        <div class="slider">
          <div class="card">
            <img src="/assets/card_1.webp" alt="card 1" />
            <div class="number">1</div>
          </div>
          <div class="card">
            <img src="/assets/card_2.webp" alt="card 2" />
            <div class="number">2</div>
          </div>
          <div class="card">
            <img src="/assets/card_3.webp" alt="card 3" />
            <div class="number">3</div>
          </div>
          <div class="card">
            <img src="/assets/card_4.webp" alt="card 4" />
            <div class="number">4</div>
          </div>
          <div class="card">
            <img src="/assets/card_5.webp" alt="card 5" />
            <div class="number">5</div>
          </div>
          <div class="card">
            <img src="/assets/card_6.webp" alt="card 6" />
            <div class="number">6</div>
          </div>
          <div class="card">
            <img src="/assets/card_7.webp" alt="card 7" />
            <div class="number">7</div>
          </div>
          <div class="card">
            <img src="/assets/card_8.webp" alt="card 8" />
            <div class="number">8</div>
          </div>
          <div class="card">
            <img src="/assets/card_9.webp" alt="card 9" />
            <div class="number">9</div>
          </div>
          <div class="card">
            <img src="/assets/card_10.webp" alt="card 10" />
            <div class="number">10</div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
